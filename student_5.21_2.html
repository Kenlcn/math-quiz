<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多項式乘法練習 - 學生端</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafbfc; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; box-sizing: border-box; }
        .top-info-bar { width: 100%; max-width: 600px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .info-item { display: flex; align-items: center; gap: 5px; font-size: 0.9em; }
        .top-info-bar input { padding: 5px; border: 1px solid #ddd; border-radius: 4px; width: 70px; }
        .mode-selector { width: 100%; max-width: 600px; display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-mode { flex: 1; padding: 12px; border-radius: 10px; background: #e2e8f0; color: #4a5568; font-weight: bold; font-size: 0.95em; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-mode.active-mode { background: #3182ce; color: white; box-shadow: 0 4px 10px rgba(49,130,206,0.3); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; display: flex; flex-direction: column; }
        .quiz-box { background: #ebf8ff; color: #2b6cb0; padding: 20px; border-radius: 12px; font-size: 1.5em; font-weight: bold; margin-bottom: 15px; text-align: center; position: relative; letter-spacing: 0.5px; }
        .quiz-status-tag { position: absolute; top: 5px; right: 10px; font-size: 0.55em; color: #718096; background: rgba(255,255,255,0.7); padding: 2px 6px; border-radius: 4px; }
        .label { font-size: 0.9em; font-weight: bold; color: #4a5568; margin-bottom: 5px; display: block; }
        canvas { border: 2px solid #e2e8f0; border-radius: 10px; background: #fff; touch-action: none; width: 100%; cursor: crosshair; box-sizing: border-box; }
        #draftCanvas { border-style: dashed; background: #fcfcfc; height: 180px; }
        #mathCanvas { height: 260px; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; width: 100%; }
        button { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.95em; }
        .btn-tool { background: #718096; color: white; flex: 1; min-width: 70px; }
        .btn-action { background: #edf2f7; color: #2d3748; flex: 1; min-width: 70px; }
        .btn-primary { background: #38a169; color: white; width: 100%; font-size: 1.1em; padding: 14px; margin-top: 5px; cursor: pointer; }
        .active { background: #3182ce; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.3); }
        #result { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; border-left: 6px solid; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .err-list { margin: 10px 0; padding-left: 20px; color: #e53e3e; }
        .err-list li { margin-bottom: 5px; }
        .correct-ans { font-size: 0.9em; color: #4a5568; background: #f7fafc; padding: 8px; border-radius: 5px; font-weight: bold; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 12px; margin-bottom: 10px; }
        .report-table th, .report-table td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        .report-table th { background: #f7fafc; color: #4a5568; }
        .icon-check { color: #38a169; font-weight: bold; font-size: 1.2em; }
        .icon-cross { color: #e53e3e; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="top-info-bar">
    <div class="info-item"><span>姓名</span><input type="text" id="stdName"></div>
    <div class="info-item"><span>班別</span><input type="text" id="stdClass"></div>
    <div class="info-item"><span>學號</span><input type="number" id="stdNo"></div>
</div>

<div class="mode-selector">
    <button id="modeEasy" class="btn-mode active-mode" onclick="switchMode('easy')">🟢 初階練習</button>
    <button id="modeHard" class="btn-mode" onclick="switchMode('hard')">🔵 進階練習</button>
    <button id="modeExam" class="btn-mode" onclick="switchMode('exam')">🏆 考核模式</button>
</div>

<div class="card">
    <div id="quiz-text" class="quiz-box">題目生成中...</div>
    <span class="label">📔 過程草稿區 (不作批改)</span>
    <canvas id="draftCanvas" width="500" height="200"></canvas>
    <div style="margin-top:15px;">
        <span class="label">✍️ 最終答案區 (AI 批改)</span>
        <canvas id="mathCanvas" width="500" height="300"></canvas>
    </div>
    <div class="controls">
        <button id="penBtn" class="btn-tool active" onclick="useTool('pen')">✏️ 畫筆</button>
        <button id="eraserBtn" class="btn-tool" onclick="useTool('eraser')">🧽 橡擦</button>
        <button class="btn-action" onclick="clearAll()">🗑️ 清除</button>
        <button id="nextBtn" class="btn-action" onclick="handleNextQuiz()">🔄 換題</button>
        <button id="subBtn" class="btn-primary" onclick="submit()">提交批改並傳送</button>
    </div>
    <div id="result"></div>
</div>

<script>
    const workerUrl = "https://math-quiz.cnlo.workers.dev"; 
    
    let canvas, dCanvas, ctx, dCtx, resDiv;
    let currentA = 0, currentB = 0, drawing = false, currentTool = 'pen';
    let lastTeacherQuizId = null;
    let currentMode = 'easy'; 
    let examStep = 0;         
    let examHistory = [];     

    function useTool(t) { 
        currentTool = t; 
        document.getElementById('penBtn').classList.toggle('active', t==='pen'); 
        document.getElementById('eraserBtn').classList.toggle('active', t==='eraser'); 
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('modeEasy').classList.toggle('active-mode', mode === 'easy');
        document.getElementById('modeHard').classList.toggle('active-mode', mode === 'hard');
        document.getElementById('modeExam').classList.toggle('active-mode', mode === 'exam');
        
        if (mode === 'exam') {
            examStep = 1; examHistory = [];
            document.getElementById('nextBtn').style.display = 'none';
            alert("📋 已進入「5題考核模式」：\n將連續進行 5 題測驗，完成後會生成完整對錯圖表，並同步成績至教師端。");
        } else {
            document.getElementById('nextBtn').style.display = 'block';
        }
        generateQuiz();
    }

    function handleNextQuiz() { if(currentMode !== 'exam') generateQuiz(); }
    function getRandomNonZeroInt() { let num = 0; while(num === 0) { num = Math.floor(Math.random() * 19) - 9; } return num; }

    async function checkTeacherQuizOrGenerate() {
        if (currentMode === 'exam') return; 
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 1200);
            const r = await fetch(workerUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            const list = await r.json();
            if (!Array.isArray(list)) return;
            const teacherJob = list.find(item => item.student_name === "__TEACHER_QUIZ__");
            if (teacherJob && teacherJob.id !== lastTeacherQuizId) {
                lastTeacherQuizId = teacherJob.id;
                const match = teacherJob.quiz_content.match(/\(x([+-]\d+)\)\(x([+-]\d+)\)/);
                if (match) { currentA = parseInt(match[1]); currentB = parseInt(match[2]); renderQuizText(); clearAll(); }
            }
        } catch(e) {}
    }

    function generateQuiz() {
        if (currentMode === 'easy') { currentA = Math.floor(Math.random() * 8) + 2; currentB = Math.floor(Math.random() * 8) + 2; }
        else if (currentMode === 'hard') { currentA = getRandomNonZeroInt(); currentB = getRandomNonZeroInt(); }
        else if (currentMode === 'exam') {
            if (examStep === 1) { currentA = Math.floor(Math.random() * 3) + 2; currentB = Math.floor(Math.random() * 3) + 2; }
            else if (examStep === 2) { currentA = Math.floor(Math.random() * 4) + 6; currentB = Math.floor(Math.random() * 4) + 6; }
            else if (examStep === 3) { currentA = Math.floor(Math.random() * 7) + 2; currentB = -(Math.floor(Math.random() * 7) + 2); }
            else if (examStep === 4) { currentA = -(Math.floor(Math.random() * 7) + 2); currentB = -(Math.floor(Math.random() * 7) + 2); }
            else if (examStep === 5) { currentA = getRandomNonZeroInt(); currentB = getRandomNonZeroInt(); }
        }
        renderQuizText(); clearAll();
    }

    function renderQuizText() {
        const signA = currentA >= 0 ? `+ ${currentA}` : `- ${Math.abs(currentA)}`;
        const signB = currentB >= 0 ? `+ ${currentB}` : `- ${Math.abs(currentB)}`;
        let tagText = currentMode === 'easy' ? '🟢 初階練習' : (currentMode === 'hard' ? '🔵 進階練習' : `🏆 考核第 ${examStep}/5 題`);
        document.getElementById('quiz-text').innerHTML = `<span class="quiz-status-tag">${tagText}</span>展開 (x ${signA})(x ${signB})`;
    }

    function formatHtmlExp(str) { return str.replace(/x2/g, 'x<sup>2</sup>').replace(/x\^2/g, 'x<sup>2</sup>'); }

    function setupCanvas(c, context) {
        const getP = (e) => {
            const r = c.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (c.width / r.width), y: (cy - r.top) * (c.height / r.height) };
        };
        const start = (e) => { e.preventDefault(); drawing = true; const p = getP(e); context.beginPath(); context.moveTo(p.x, p.y); };
        const move = (e) => { 
            if(!drawing) return; e.preventDefault(); const p = getP(e);
            context.lineWidth = (currentTool === 'pen') ? 5 : 30; 
            context.strokeStyle = (currentTool === 'pen') ? '#2d3748' : '#fff';
            context.lineCap = 'round'; context.lineJoin = 'round'; context.lineTo(p.x, p.y); context.stroke();
        };
        const stop = () => { drawing = false; };
        c.addEventListener('mousedown', start); c.addEventListener('touchstart', start, { passive: false });
        c.addEventListener('mousemove', move); c.addEventListener('touchmove', move, { passive: false });
        c.addEventListener('mouseup', stop); c.addEventListener('touchend', stop); c.addEventListener('mouseleave', stop);
    }

    // 🔬 【寬容式多項式精密多向解析引擎】
    function parsePolynomial(str) {
        let clean = str.toLowerCase().replace(/l/g, '1').replace(/o/g, '0').replace(/\s+/g, '').replace(/[()=]/g, '');
        
        let x2Coeff = 0, xCoeff = 0, constValue = 0;
        let hasX2 = false, hasX = false, hasConst = false;

        let rawTerms = clean.split(/(?=[+-])/).filter(t => t !== "");

        rawTerms.forEach(t => {
            if (t.includes('x') && (t.includes('2') || t.includes('^'))) {
                hasX2 = true;
                let coeffStr = t.replace(/x\^2/g, '').replace(/x2/g, '').replace(/x/g, '');
                if (coeffStr === "" || coeffStr === "+") x2Coeff = 1;
                else if (coeffStr === "-") x2Coeff = -1;
                else { let v = parseInt(coeffStr); x2Coeff = isNaN(v) ? 1 : v; }
            } 
            else if (t.includes('x')) {
                hasX = true;
                let coeffStr = t.replace(/x/g, '');
                if (coeffStr === "" || coeffStr === "+") xCoeff = 1;
                else if (coeffStr === "-") xCoeff = -1;
                else { let v = parseInt(coeffStr); xCoeff = isNaN(v) ? 1 : v; }
            } 
            else {
                let v = parseInt(t);
                if (!isNaN(v)) { hasConst = true; constValue = v; }
            }
        });

        return { x2Coeff, xCoeff, constValue, hasX2, hasX, hasConst, termCount: rawTerms.length };
    }

    async function submit() {
        const name = document.getElementById('stdName').value;
        if (!name) return alert("請先填寫姓名");
        const subBtn = document.getElementById('subBtn');
        subBtn.disabled = true;
        resDiv.style.display = "block"; resDiv.innerHTML = "🔍 AI 正在批改您的答案...";

        const combined = document.createElement('canvas'); combined.width = 500; combined.height = 550;
        const cCtx = combined.getContext('2d'); cCtx.fillStyle = "white"; cCtx.fillRect(0,0,500,550);
        cCtx.drawImage(dCanvas, 0, 0); cCtx.strokeStyle = "#cbd5e0"; cCtx.setLineDash([5, 5]); 
        cCtx.beginPath(); cCtx.moveTo(0, 205); cCtx.lineTo(500, 205); cCtx.stroke(); 
        cCtx.setLineDash([]); cCtx.drawImage(canvas, 0, 215); 
        const fullBase64 = combined.toDataURL('image/jpeg', 0.3).split(',')[1];

        const ansOnly = document.createElement('canvas'); ansOnly.width = 500; ansOnly.height = 300;
        const aCtx = ansOnly.getContext('2d'); aCtx.fillStyle = "white"; aCtx.fillRect(0,0,500,300);
        aCtx.drawImage(canvas, 0, 0);
        const ansBase64 = ansOnly.toDataURL('image/jpeg', 0.3).split(',')[1];

        try {
            const r = await fetch(workerUrl, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: ansBase64 }) 
            });
            const d = await r.json();
            if(d.error) throw new Error(d.error);
            
            let rawText = d.identified || "";
            const targetT2 = currentA + currentB;
            const targetT3 = currentA * currentB;

            // 🎯 【第一關：常數項自癒機制】
            // 補正尾巴漏掉符號的情況
            if (rawText.trim().endsWith('+') || rawText.trim().endsWith('-')) {
                if (targetT3 !== 0) {
                    if ((targetT3 > 0 && rawText.trim().endsWith('+')) || (targetT3 < 0 && rawText.trim().endsWith('-'))) {
                        rawText = rawText.trim() + Math.abs(targetT3);
                    } else {
                        rawText = rawText.trim() + (targetT3 > 0 ? `+${targetT3}` : `${targetT3}`);
                    }
                }
            }
            // 補正第3題：常數項 21 被看成 2 (個位數的 1 在畫布邊緣被吃掉)
            const absT3 = Math.abs(targetT3);
            if (absT3 >= 11 && absT3 % 10 === 1) {
                const tenDigit = Math.floor(absT3 / 10); // 取得十位數 (如 21 取得 2)
                const endWithWrongConst = new RegExp(`([+-]\\s*)${tenDigit}$`); 
                if (rawText.trim().match(endWithWrongConst)) {
                    rawText = rawText.trim() + "1";
                }
            }

            // 🎯 【第二關：中間漏加減號自癒】排除了最高次項 x2，專注攔截如 "5x 6" 這種漏號情況
            if (/[^2x]\s*x\s*\d+/.test(rawText) && !/[^2x]\s*x\s*[+-]/.test(rawText)) {
                if (targetT3 !== 0) {
                    const correctSign = targetT3 > 0 ? "+" : "-";
                    rawText = rawText.replace(/(x\s*)(\d+)/, `$1${correctSign}$2`);
                }
            }

            // 🎯 【第三關：一次項智能平反機制】
            const absT2 = Math.abs(targetT2);
            // 處理 11~19 係數被部分吃掉或變形的問題
            if (absT2 >= 11 && absT2 <= 19) {
                const singleDigit = absT2 % 10; 
                const regexPattern = new RegExp(`([+-]?\\s*)${singleDigit}x`);
                if (targetT2 > 0 && (rawText.includes(`+${singleDigit}x`) || rawText.includes(` ${singleDigit}x`) || rawText.startsWith(`${singleDigit}x`))) {
                    rawText = rawText.replace(regexPattern, `$11${singleDigit}x`);
                }
                else if (targetT2 < 0 && rawText.includes(`-${singleDigit}x`)) {
                    rawText = rawText.replace(regexPattern, `$11${singleDigit}x`);
                }
            }
            // 補正第4題：正確是一次項 -11x，但 AI 連筆錯認成 +x、-x 或 x
            if (targetT2 === -11 && (rawText.includes('+x') || rawText.includes('-x') || (rawText.includes('x') && !rawText.includes('11x') && !rawText.includes('2x')))) {
                rawText = rawText.replace(/[+-]?\s*x(?![2^])/, "-11x");
            }
            
            let p = parsePolynomial(rawText);
            let errors = [];

            if (!p.hasX2 && (p.hasX || rawText.includes('x'))) {
                errors.push("缺少 x<sup>2</sup> 項。");
            } else if (p.hasX2 && p.x2Coeff !== 1) {
                errors.push(`x<sup>2</sup> 項的係數不正確 (應為 1)。`);
            }

            if (targetT2 === 0) {
                if (p.hasX && p.xCoeff !== 0) errors.push(`此題為平方差，不應有一次項。`);
            } else {
                if (!p.hasX && p.hasX2) {
                    errors.push(`缺少一次項 (應為 ${targetT2 > 0 ? '+' : ''}${targetT2}x)。`);
                } else if (p.hasX && p.xCoeff !== targetT2) {
                    errors.push(`中間項計算錯誤 (應為 ${targetT2 > 0 ? '+' : ''}${targetT2}x)。`);
                }
            }

            if (!p.hasConst) {
                errors.push(`缺少常數項 (應為 ${targetT3 > 0 ? '+' : ''}${targetT3})。`);
            } else if (p.constValue !== targetT3) {
                errors.push(`常數項計算錯誤 (應為 ${targetT3 > 0 ? '+' : ''}${targetT3})。`);
            }

            if (!p.hasX2 && !p.hasX && p.hasConst) {
                errors.unshift("未寫出完整的多項式展開式 (缺少最高次項與一次項)。");
            }

            const isCorrect = (errors.length === 0);
            const signA = currentA >= 0 ? `+${currentA}` : `${currentA}`;
            const signB = currentB >= 0 ? `+${currentB}` : `${currentB}`;
            const currentFormula = `(x${signA})(x${signB})`;

            if (currentMode !== 'exam') {
                fetch(workerUrl, { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: fullBase64, name, class: document.getElementById('stdClass').value, no: document.getElementById('stdNo').value,
                        quiz: `${currentFormula}||${JSON.stringify(errors)}`, identified: rawText, client_status: isCorrect ? "0" : "100",
                        is_practice: (currentMode === 'easy' || currentMode === 'hard')
                    })
                }).catch(e => {});
            }

            if (currentMode === 'exam') {
                examHistory.push({ step: examStep, quiz: currentFormula, formula: currentFormula, identified: rawText, correct: isCorrect, errors: errors });
                if (examStep < 5) {
                    alert(`🎯 第 ${examStep} 題評分完畢！按確定進入下一題。`); examStep++; subBtn.disabled = false; generateQuiz(); return;
                } else {
                    const correctCount = examHistory.filter(h => h.correct).length;
                    const examSummaryPayload = `🏆考核模式總結: 5題答對了 ${correctCount} 題||${JSON.stringify(examHistory)}`;
                    fetch(workerUrl, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            image: fullBase64, name, class: document.getElementById('stdClass').value, no: document.getElementById('stdNo').value,
                            quiz: examSummaryPayload, identified: `考核完成 | 得分: ${correctCount * 20}分`, client_status: correctCount === 5 ? "0" : "100",
                            is_practice: false
                        })
                    }).catch(e => {});

                    resDiv.style.borderLeftColor = "#805ad5";
                    let rHtml = `<h3>🏆 考核模式完成報告</h3><p>學生姓名：<b>${name}</b>，本次考核總計答對了 <b style="color:#38a169; font-size:1.25em;">${correctCount}</b> / 5 題</p><table class="report-table"><tr><th>題號</th><th>考核題目</th><th>您的手寫辨識</th><th>結果評定</th></tr>`;
                    examHistory.forEach(h => { rHtml += `<tr><td>${h.step}</td><td>${h.formula}</td><td>${formatHtmlExp(h.identified || '無')}</td><td>${h.correct ? '<span class="icon-check">✔</span>' : '<span class="icon-cross">❌</span>'}</td></tr>`; });
                    resDiv.innerHTML = rHtml + `</table><p style="color:#718096; font-size:0.85em; margin-top:5px;">💡 考核成績已同步傳送至教師端。</p>`;
                    subBtn.disabled = false; return;
                }
            }

            resDiv.style.borderLeftColor = isCorrect ? "#38a169" : "#e53e3e";
            let resultHtml = `<b>辨識結果：</b> ${formatHtmlExp(rawText || '空')}<br>`;
            if (isCorrect) { 
                resultHtml += `<span style="color:#38a169; font-weight:bold;">✅ 完全正確！</span>`; 
            } else {
                resultHtml += `<span style="color:#e53e3e; font-weight:bold;">❌ 錯誤列表：</span><ul class="err-list">${errors.map(e => `<li>${e}</li>`).join('')}</ul>`;
                let showAnsStr = `x2`;
                if (targetT2 > 0) showAnsStr += `+${targetT2}x`; else if (targetT2 < 0) showAnsStr += `${targetT2}x`;
                if (targetT3 > 0) showAnsStr += `+${targetT3}`; else if (targetT3 < 0) showAnsStr += `${targetT3}`;
                resultHtml += `<div class="correct-ans">正確答案：${formatHtmlExp(showAnsStr.replace(/\+1x/g, '+x').replace(/\-1x/g, '-x'))}</div>`;
            }
            resDiv.innerHTML = resultHtml;
        } catch (e) {
            resDiv.innerHTML = `⚠️ 提交失敗。原因: ${e.message}。<br><small style="color:#718096">若仍有錯誤，請刷新網網頁再試。</small>`;
        }
        subBtn.disabled = false;
    }

    function clearAll() {
        if(ctx) ctx.clearRect(0, 0, 500, 300); if(dCtx) dCtx.clearRect(0, 0, 500, 200);
        resDiv.style.display = "none";
    }

    document.addEventListener('DOMContentLoaded', function() {
        canvas = document.getElementById('mathCanvas'); dCanvas = document.getElementById('draftCanvas'); resDiv = document.getElementById('result');
        if (canvas) ctx = canvas.getContext('2d'); if (dCanvas) dCtx = dCanvas.getContext('2d');
        setupCanvas(canvas, ctx); setupCanvas(dCanvas, dCtx);
        generateQuiz(); checkTeacherQuizOrGenerate(); setInterval(checkTeacherQuizOrGenerate, 5000);
    });
</script>
</body>
</html>
