<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多項式乘法練習 - 學生端</title>
    <script>window.MathJax = { tex: { inlineMath: [['\\(', '\\)']] } };</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafbfc; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; -webkit-user-select: none; user-select: none; }
        .top-info-bar { width: 100%; max-width: 600px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .info-item { display: flex; align-items: center; gap: 5px; font-size: 0.9em; color: #4a5568; }
        .top-info-bar input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 75px; font-size: 1em; -webkit-appearance: none; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        .quiz-box { background: #ebf8ff; color: #2b6cb0; padding: 20px; border-radius: 12px; font-size: 1.5em; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .label { font-size: 0.9em; font-weight: bold; color: #4a5568; margin-bottom: 5px; display: block; }
        
        /* 核心相容：touch-action 防止 iOS/Android 在 Canvas 畫圖時網頁跟著滾動與彈回 */
        canvas { border: 2px solid #e2e8f0; border-radius: 10px; background: #fff; touch-action: none; width: 100%; cursor: crosshair; box-sizing: border-box; }
        #draftCanvas { border-style: dashed; background: #fcfcfc; height: 180px; }
        #mathCanvas { height: 260px; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; flex: 1; font-size: 0.95em; -webkit-tap-highlight-color: transparent; }
        .btn-tool { background: #718096; color: white; }
        .btn-primary { background: #38a169; color: white; width: 100%; margin-top: 12px; font-size: 1.1em; padding: 15px; }
        .active { background: #3182ce; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.4); }
        #result { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; border-left: 6px solid; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .err-list { margin: 10px 0; padding-left: 20px; color: #e53e3e; }
        .err-list li { margin-bottom: 5px; }
        .correct-ans { font-size: 0.95em; color: #4a5568; background: #f7fafc; padding: 10px; border-radius: 6px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-info-bar">
    <div class="info-item"><span>姓名</span><input type="text" id="stdName"></div>
    <div class="info-item"><span>班別</span><input type="text" id="stdClass"></div>
    <div class="info-item"><span>學號</span><input type="number" id="stdNo"></div>
</div>

<div class="card">
    <div id="quiz-text" class="quiz-box">載入中...</div>
    
    <span class="label">📔 過程草稿區 (不參與批改)</span>
    <canvas id="draftCanvas" width="500" height="200"></canvas>

    <div style="margin-top:15px;">
        <span class="label">✍️ 最終答案區 (AI 批改)</span>
        <canvas id="mathCanvas" width="500" height="300"></canvas>
    </div>

    <div class="controls">
        <button id="penBtn" class="btn-tool active" onclick="useTool('pen')">✏️ 畫筆</button>
        <button id="eraserBtn" class="btn-tool" onclick="useTool('eraser')">🧽 橡擦</button>
        <button style="background:#edf2f7; color:#2d3748;" onclick="clearAll()">🗑️ 清除</button>
        <button style="background:#edf2f7; color:#2d3748;" onclick="generateQuiz()">🔄 換題</button>
        <button id="subBtn" class="btn-primary" onclick="submit()">提交批改並傳送</button>
    </div>
    <div id="result"></div>
</div>

<script>
    // ⚠️ 請確保此處的 Worker 網址與您部署的 Cloudflare 一致
    const workerUrl = "https://dry-frog-fc8b.cnlo.workers.dev";
    
    const canvas = document.getElementById('mathCanvas');
    const dCanvas = document.getElementById('draftCanvas');
    const ctx = canvas.getContext('2d');
    const dCtx = dCanvas.getContext('2d');
    const resDiv = document.getElementById('result');
    
    let currentA = 0, currentB = 0, drawing = false, currentTool = 'pen';

    function useTool(t) { 
        currentTool = t; 
        document.getElementById('penBtn').classList.toggle('active', t==='pen'); 
        document.getElementById('eraserBtn').classList.toggle('active', t==='eraser'); 
    }

    function generateQuiz() {
        currentA = Math.floor(Math.random() * 8) + 2;
        currentB = Math.floor(Math.random() * 8) + 2;
        document.getElementById('quiz-text').innerHTML = `展開 \\( (x + ${currentA})(x + ${currentB}) \\)`;
        if (window.MathJax) MathJax.typesetPromise();
        clearAll();
    }

    // 同時綁定 Mouse (PC) 與 Touch (iOS/Android 行動端) 觸控位置計算邏輯
    function setupCanvas(c, context) {
        const getP = (e) => {
            const r = c.getBoundingClientRect();
            let cx = 0, cy = 0;
            if (e.touches && e.touches.length > 0) {
                cx = e.touches[0].clientX;
                cy = e.touches[0].clientY;
            } else {
                cx = e.clientX;
                cy = e.clientY;
            }
            return { x: (cx - r.left) * (c.width / r.width), y: (cy - r.top) * (c.height / r.height) };
        };
        
        const start = (e) => { 
            e.preventDefault(); 
            drawing = true; 
            const p = getP(e); 
            context.beginPath(); 
            context.moveTo(p.x, p.y); 
        };
        
        const move = (e) => { 
            if(!drawing) return; 
            e.preventDefault(); 
            const p = getP(e);
            context.lineWidth = (currentTool === 'pen') ? 5 : 30; 
            context.strokeStyle = (currentTool === 'pen') ? '#2d3748' : '#fff';
            context.lineCap = 'round'; 
            context.lineJoin = 'round';
            context.lineTo(p.x, p.y); 
            context.stroke();
        };

        c.addEventListener('mousedown', start, {passive: false}); 
        c.addEventListener('touchstart', start, {passive: false});
        c.addEventListener('mousemove', move, {passive: false}); 
        c.addEventListener('touchmove', move, {passive: false});
    }

    setupCanvas(canvas, ctx); 
    setupCanvas(dCanvas, dCtx);
    
    const stopDrawing = () => drawing = false;
    window.addEventListener('mouseup', stopDrawing); 
    window.addEventListener('touchend', stopDrawing);

    function isCanvasBlank(c) {
        const blank = document.createElement('canvas');
        blank.width = c.width; blank.height = c.height;
        return c.toDataURL() === blank.toDataURL();
    }

    async function submit() {
        const name = document.getElementById('stdName').value.trim();
        if (!name) return alert("請先填寫姓名");
        
        if (isCanvasBlank(canvas)) {
            return alert("請在『最終答案區』寫下答案後再提交！");
        }

        const subBtn = document.getElementById('subBtn');
        subBtn.disabled = true;
        resDiv.style.display = "block";
        resDiv.innerHTML = "🔍 AI 正在批改您的答案...";

        // 1. 合併畫布 (草稿在上，答案在下，底色全白)
        const combined = document.createElement('canvas');
        combined.width = 500; combined.height = 550;
        const cCtx = combined.getContext('2d');
        cCtx.fillStyle = "white"; cCtx.fillRect(0,0,500,550);
        cCtx.drawImage(dCanvas, 0, 0); 
        cCtx.strokeStyle = "#cbd5e0"; cCtx.setLineDash([5, 5]); 
        cCtx.beginPath(); cCtx.moveTo(0, 205); cCtx.lineTo(500, 205); cCtx.stroke(); 
        cCtx.setLineDash([]); cCtx.drawImage(canvas, 0, 215); 
        const fullBase64 = combined.toDataURL('image/jpeg', 0.6).split(',')[1];

        // 2. 單獨答案畫布（底色改為全白，防止部分手機透明背景在 AI 端變黑底）
        const ansOnly = document.createElement('canvas');
        ansOnly.width = 500; ansOnly.height = 300;
        const aCtx = ansOnly.getContext('2d');
        aCtx.fillStyle = "white"; aCtx.fillRect(0,0,500,300); 
        aCtx.drawImage(canvas, 0, 0);
        const ansBase64 = ansOnly.toDataURL('image/jpeg', 0.6).split(',')[1];

        try {
            // 第一步：發送圖片到 Worker 進行 AI 識別
            const r = await fetch(workerUrl, { method: 'POST', body: JSON.stringify({ image: ansBase64 }) });
            const d = await r.json();
            
            let raw = (d.identified || "").toLowerCase();
            raw = raw.replace(/t/g, '+');             // 手寫錯誤校正
            raw = raw.replace(/\s+/g, '+');           // 空格校正
            raw = raw.replace(/[^x0-9\+\-\^]/g, '');  // 清理無效數學雜質
            
            if (raw.includes('x2') && !raw.includes('x^2')) raw = raw.replace('x2', 'x^2');

            // 第二步：防崩潰的多項式安全拆項比對邏輯
            const targetT2 = currentA + currentB;
            const targetT3 = currentA * currentB;
            
            const terms = raw.split(/(?=[+-])/).filter(t => t !== "");
            
            // 安全條件過濾，若無該項則回傳空字串，防止調用 replace 時閃退
            let s1 = terms.find(t => t && (t.includes('x^2') || t.includes('x2'))) || "";
            let s2 = terms.find(t => t && t.includes('x') && !t.includes('^') && !t.includes('x2')) || "";
            let s3 = terms.find(t => t && t !== "" && !t.includes('x')) || "";

            let errors = [];
            
            // 若只包含純數字或只有單個項，進入安全提示，不引發 JavaScript 錯誤
            if (terms.length <= 1 && raw !== "") {
                errors.push(`答案不完整。您目前只寫了 \\( ${raw} \\)，而完全展開後應該要有三個項 (如：\\( x^2 + ax + b \\))。`);
            } else {
                if (!s1) {
                    errors.push("缺少 \\( x^2 \\) 項。");
                } else if (s1 !== "x^2" && s1 !== "+x^2") {
                    errors.push(`第一項應為 \\( x^2 \\) (辨識為 \\( ${s1} \\))。`);
                }

                const s2Val = s2 ? s2.replace('+', '') : "";
                if (!s2) {
                    errors.push(`缺少一次項 (應為 \\( +${targetT2}x \\))。`);
                } else if (s2Val !== `${targetT2}x`) {
                    errors.push(`中間一次項計算錯誤 (辨識為 \\( ${s2} \\))。`);
                }

                const s3Val = s3 ? s3.replace('+', '') : "";
                if (!s3) {
                    errors.push(`缺少常數項 (應為 \\( +${targetT3} \\))。`);
                } else if (s3Val !== `${targetT3}`) {
                    errors.push(`常數項計算錯誤 (辨識為 \\( ${s3} \\))。`);
                }

                if (terms.length > 3) {
                    errors.push("多項式的項數過多，請注意合併同類項。");
                }
            }

            const isCorrect = (errors.length === 0 && raw !== "");

            // 第三步：上傳到資料庫存檔
            await fetch(workerUrl, { method: 'POST', body: JSON.stringify({ 
                image: fullBase64, name, 
                class: document.getElementById('stdClass').value,
                no: document.getElementById('stdNo').value,
                quiz: `(x+${currentA})(x+${currentB})`,
                identified: raw,
                client_status: isCorrect ? "0" : "100"
            })});

            // 第四步：介面本地渲染
            resDiv.style.borderLeftColor = isCorrect ? "#38a169" : "#e53e3e";
            let resultHtml = `<b>辨識結果：</b> \\( ${raw || '無法辨識'} \\)<br>`;
            
            if (isCorrect) {
                resultHtml += `<span style="color:#38a169; font-weight:bold;">✅ 完全正確！</span>`;
            } else {
                resultHtml += `<span style="color:#e53e3e; font-weight:bold;">❌ 錯誤列表：</span>`;
                resultHtml += `<ul class="err-list">${errors.map(e => `<li>${e}</li>`).join('')}</ul>`;
                resultHtml += `<div class="correct-ans">正確答案應該是：\\( x^2 + ${targetT2}x + ${targetT3} \\)</div>`;
            }
            
            resDiv.innerHTML = resultHtml;
            if (window.MathJax) MathJax.typesetPromise();

        } catch (e) {
            console.error(e);
            resDiv.innerHTML = "⚠️ 系統分析失敗，請重新繪寫清晰後再試一次。";
        }
        subBtn.disabled = false;
    }

    function clearAll() {
        ctx.clearRect(0,0,500,300);
        dCtx.clearRect(0,0,500,200);
        resDiv.style.display = "none";
    }
    generateQuiz();
</script>
</body>
</html>
